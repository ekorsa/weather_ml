version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # ✅ persist DB
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - app-net

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - app-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT}:8000"
    networks:
      - app-net

  # ✅ ML batch job (runs on demand)
  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: ml-worker
    volumes:
      - ./models:/app/models
    depends_on:
      - postgres
      - redis
      - pushgateway
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - app-net
    command: ["python", "predict.py"]

  # ✅ Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-net

  # ✅ PushGateway (for ML metrics)
  pushgateway:
    image: prom/pushgateway
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - app-net

  # ✅ Postgres exporter
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      - postgres
    ports:
      - "9187:9187"
    networks:
      - app-net

  # ✅ Redis exporter
  redis_exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "9121:9121"
    networks:
      - app-net

volumes:
  postgres_data:  # ✅ persists DB even after container removal

networks:
  app-net:
    driver: bridge
