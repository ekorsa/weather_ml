name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build -f Dockerfile.api -t ghcr.io/${{ github.repository }}/api:latest .

      - name: Build ML image
        run: |
          docker build -f Dockerfile.ml -t ghcr.io/${{ github.repository }}/ml:latest .

      - name: Push API image
        run: |
          docker push ghcr.io/${{ github.repository }}/api:latest

      - name: Push ML image
        run: |
          docker push ghcr.io/${{ github.repository }}/ml:latest
