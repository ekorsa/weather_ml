global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
